name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, master]

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish
    if: |
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'release/') ||
        startsWith(github.event.pull_request.head.ref, 'fix/')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          CURRENT_LINE=$(grep -E '^version[[:space:]]*=[[:space:]]*"' pyproject.toml) || {
            echo "Could not find a 'version = \"MAJOR.MINOR.PATCH\"' line in pyproject.toml." >&2
            exit 1
          }
          CURRENT=$(printf '%s\n' "$CURRENT_LINE" | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Current version '$CURRENT' is not in 'MAJOR.MINOR.PATCH' format." >&2
            exit 1
          fi
          echo "new_version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Version: $CURRENT"

      - name: Tag version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run lint
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest tests/

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv publish
